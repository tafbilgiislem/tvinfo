<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Ekran Oynatıcı - Swiper TV Optimize V43</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
        
        /* Inline SVG'nin tam ekrana oturması için */
        .swiper-slide svg { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="slide-container">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Editör bu değerleri güncelleyecektir. Dokunmayın.
        const SWIPER_CONFIG = {
            speed: 1500,
            effect: 'cube'
        };

        let currentSettingsString = "";
        let swiperInstance = null;

        // OTOMATİK TAM EKRAN: 5 Saniye Sonra
        setTimeout(() => {
            const docEl = document.documentElement;
            const requestMethod = docEl.requestFullscreen || docEl.webkitRequestFullScreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
            if (requestMethod) {
                requestMethod.call(docEl).catch(err => console.warn("Tam ekran hatası:", err));
            }
        }, 5000);

        // ANDROID TV: 4 Saatte bir belleği temizle (Şişmeyi önler)
        setTimeout(() => window.location.reload(), 4 * 60 * 60 * 1000);

        async function initSlider() {
            try {
                let cacheBuster = Math.floor(Date.now() / 30000);
                const setRes = await fetch('settings.json?t=' + cacheBuster);
                const settings = await setRes.json();
                
                // Ayarların mevcut durumunu kaydet (Sonradan güncelleme kontrolü için)
                currentSettingsString = JSON.stringify(settings);
                
                const container = document.getElementById('slide-container');
                container.innerHTML = ""; // Temizle
                
                // Slaytları ve SVG'leri Çek
                for (let slide of settings) {
                    const svgRes = await fetch(slide.file + '?v=' + cacheBuster);
                    if (svgRes.ok) {
                        const svgText = await svgRes.text();
                        
                        const slideDiv = document.createElement('div');
                        slideDiv.className = 'swiper-slide';
                        slideDiv.setAttribute('data-swiper-autoplay', slide.duration || 5000);
                        slideDiv.innerHTML = svgText;
                        
                        // --- ALAN 1 ROTASYONU ---
                        // Sadece bu slaytın içindeki objeyi bulmak için slideDiv.querySelector kullanıyoruz.
                        const imgElement1 = slideDiv.querySelector("#degisen-resim-1");
                        if (imgElement1) {
                            const subImages1 = ["resim1.jpg", "resim2.jpg", "resim3.jpg"]; 
                            let idx1 = 0;
                            imgElement1.setAttribute("href", subImages1[0]);
                            imgElement1.setAttributeNS("http://www.w3.org/1999/xlink", "href", subImages1[0]);

                            setInterval(() => {
                                // Yalnızca ekranda görünen slaytın resimleri dönsün (Performans tasarrufu)
                                if (!slideDiv.classList.contains("swiper-slide-active")) return;
                                idx1 = (idx1 + 1) % subImages1.length;
                                imgElement1.setAttribute("href", subImages1[idx1]);
                                imgElement1.setAttributeNS("http://www.w3.org/1999/xlink", "href", subImages1[idx1]);
                            }, 3000); 
                        }

                        // --- ALAN 2 ROTASYONU ---
                        const imgElement2 = slideDiv.querySelector("#degisen-resim-2");
                        if (imgElement2) {
                            const subImages2 = ["resim4.jpg", "resim5.jpg", "resim6.jpg"]; 
                            let idx2 = 0;
                            imgElement2.setAttribute("href", subImages2[0]);
                            imgElement2.setAttributeNS("http://www.w3.org/1999/xlink", "href", subImages2[0]);

                            setInterval(() => {
                                if (!slideDiv.classList.contains("swiper-slide-active")) return;
                                idx2 = (idx2 + 1) % subImages2.length;
                                imgElement2.setAttribute("href", subImages2[idx2]);
                                imgElement2.setAttributeNS("http://www.w3.org/1999/xlink", "href", subImages2[idx2]);
                            }, 3000); 
                        }

                        container.appendChild(slideDiv);
                    }
                }

                // Swiper'ı Başlat
                swiperInstance = new Swiper('.mySwiper', {
                    effect: SWIPER_CONFIG.effect,
                    speed: SWIPER_CONFIG.speed,
                    grabCursor: true,
                    loop: true,
                    autoplay: {
                        delay: 5000,
                        disableOnInteraction: false,
                    },
                    // 3D Efekt Ayarları (Seçili efekte göre otomatik devreye girer)
                    cubeEffect: { shadow: true, slideShadows: true, shadowOffset: 20, shadowScale: 0.94 },
                    coverflowEffect: { rotate: 50, stretch: 0, depth: 100, modifier: 1, slideShadows: true },
                    cardsEffect: { slideShadows: true }
                });

                // Canlı Güncelleme Kontrolünü Başlat
                startUpdateChecker();

            } catch (error) {
                console.error("Slaytlar yüklenemedi:", error);
                setTimeout(initSlider, 5000); // Hata olursa 5 saniye sonra tekrar dene
            }
        }

        // --- ARKA PLAN GÜNCELLEME KONTROLÜ ---
        function startUpdateChecker() {
            setInterval(async () => {
                try {
                    let cacheBuster = Math.floor(Date.now() / 30000);
                    const resp = await fetch('settings.json?t=' + cacheBuster);
                    const newConfig = await resp.json();
                    const newSettingsString = JSON.stringify(newConfig);

                    // Eğer editörden yeni bir ayar kaydedildiyse sayfayı yenileyerek yeni ayarları al
                    if (newSettingsString !== currentSettingsString) {
                        console.log("Yeni ayarlar tespit edildi, oynatıcı yenileniyor...");
                        window.location.reload();
                    }
                } catch (e) {
                    // Sessizce hatayı yoksay, TV yayını kesilmesin
                }
            }, 10000); // Her 10 saniyede bir kontrol et
        }

        // Sistemi Başlat
        initSlider();
    </script>
</body>
</html>
