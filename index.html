<!DOCTYPE html>
<html lang="tr">
<head>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <meta charset="UTF-8">
    <title>SVG Pro Studio - Display V42</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #slider { position: relative; width: 100vw; height: 100vh; }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: all 1s ease-in-out; pointer-events: none; object-fit: contain; backface-visibility: hidden; transform: translateZ(0); will-change: opacity, transform; }
        .slide.active { opacity: 1; z-index: 10; }
        
        /* Efekt Sınıfları */
        .cube{transform:rotateY(180deg) scale(.5);opacity:0;}.cube.active{transform:rotateY(0) scale(1);opacity:1;transition:1.5s;}
        .fade.active { opacity: 1; }

        .overlay-box { position: absolute; bottom: 4%; z-index: 100; border: 3px solid #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8); background-color: #000; transition: all 0.5s ease; }
        #sabit-alan-sol { left: 4%; }
        #sabit-alan-sag { right: 4%; }
        .overlay-box video, .overlay-box img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.6s ease; }
    </style>
</head>
<body>

<div id="slider"></div>

<div id="sabit-alan-sol" class="overlay-box">
    <video id="sol-video" autoplay loop muted playsinline></video>
</div>

<div id="sabit-alan-sag" class="overlay-box">
    <img id="sag-resim" src="" alt="Dinamik Sağ">
</div>

<script>
    const slider = document.getElementById("slider");
    const videoSol = document.getElementById('sol-video');
    const sagImgEl = document.getElementById("sag-resim");
    let slides = [];
    let slideTimer;
    let currentConfig = null;
    let hls = null;
    let sagIdx = 0;
    let sagInterval;

    async function syncSystem() {
        try {
            const resp = await fetch('settings.json?t=' + Date.now());
            const config = await resp.json();
            
            // Slayt Değişikliği Kontrolü
            if (!currentConfig || JSON.stringify(currentConfig.slides) !== JSON.stringify(config.slides)) {
                initSlider(config.slides);
            }

            // Sol Ekran (M3U8) Kontrolü
            const msL = config.mini_screens.left;
            const solBox = document.getElementById('sabit-alan-sol');
            if(msL.visible) {
                solBox.style.display = "block";
                solBox.style.width = msL.w + "vw";
                solBox.style.height = msL.h + "vw";
                if(videoSol.dataset.url !== msL.url) {
                    loadVideo(msL.url);
                    videoSol.dataset.url = msL.url;
                }
            } else { solBox.style.display = "none"; }

            // Sağ Ekran (Resim Rotasyonu) Kontrolü
            const msR = config.mini_screens.right;
            const sagBox = document.getElementById('sabit-alan-sag');
            if(msR.visible) {
                sagBox.style.display = "block";
                sagBox.style.width = msR.w + "vw";
                sagBox.style.height = msR.h + "vw";
                startRightRotation(msR.images, msR.interval);
            } else { sagBox.style.display = "none"; }

            currentConfig = config;
        } catch (e) { console.error("Sync Error", e); }
    }

    function initSlider(slideList) {
        slider.innerHTML = "";
        slides = [];
        slideList.forEach((s) => {
            const obj = document.createElement("object");
            obj.data = s.file + "?v=" + Math.floor(Date.now() / 60000);
            obj.type = "image/svg+xml";
            obj.className = `slide ${s.effect}`;
            obj.dataset.duration = s.duration;
            slider.appendChild(obj);
            slides.push(obj);
        });
        showSlide(0);
    }

    function showSlide(index) {
        if (slides.length === 0) return;
        slides.forEach(s => s.classList.remove("active"));
        slides[index].classList.add("active");
        clearTimeout(slideTimer);
        slideTimer = setTimeout(() => showSlide((index + 1) % slides.length), parseInt(slides[index].dataset.duration));
    }

    function loadVideo(url) {
        if (hls) hls.destroy();
        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(videoSol);
            hls.on(Hls.Events.MANIFEST_PARSED, () => videoSol.play());
        } else if (videoSol.canPlayType('application/vnd.apple.mpegurl')) {
            videoSol.src = url;
        }
    }

    function startRightRotation(images, interval) {
        if (sagInterval) clearInterval(sagInterval);
        sagImgEl.src = images[0];
        sagInterval = setInterval(() => {
            sagImgEl.style.opacity = 0;
            setTimeout(() => {
                sagIdx = (sagIdx + 1) % images.length;
                sagImgEl.src = images[sagIdx];
                sagImgEl.style.opacity = 1;
            }, 600);
        }, interval || 5000);
    }

    syncSystem();
    setInterval(syncSystem, 30000); // 30 saniyede bir bulutu kontrol et
    setTimeout(() => document.documentElement.requestFullscreen?.(), 5000);
    setTimeout(() => window.location.reload(), 4 * 60 * 60 * 1000); // 4 saatte bir refresh
</script>
</body>
</html>
