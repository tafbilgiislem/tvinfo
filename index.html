<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Ekran Oynatıcı</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { display: flex; align-items: center; justify-content: center; background: #000; }
        .swiper-slide svg { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="slide-container">
            </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Editör bu değerleri güncelleyecektir. Dokunmayın.
        const SWIPER_CONFIG = {
            speed: 1500,
            effect: 'cube'
        };

        async function loadSlides() {
            try {
                // 1. Ayarları Çek
                const setRes = await fetch('/settings.json');
                const settings = await setRes.json();
                const container = document.getElementById('slide-container');
                
                // 2. Slaytları Çek ve Ekle
                for (let slide of settings) {
                    const svgRes = await fetch('/' + slide.file);
                    if (svgRes.ok) {
                        const svgText = await svgRes.text();
                        const slideDiv = document.createElement('div');
                        slideDiv.className = 'swiper-slide';
                        // Özel süreyi Swiper'a bildir
                        slideDiv.setAttribute('data-swiper-autoplay', slide.duration || 5000);
                        slideDiv.innerHTML = svgText;
                        container.appendChild(slideDiv);
                    }
                }

                // 3. Swiper'ı Başlat
                new Swiper('.mySwiper', {
                    effect: SWIPER_CONFIG.effect,
                    speed: SWIPER_CONFIG.speed,
                    grabCursor: true,
                    loop: true,
                    autoplay: {
                        delay: 5000,
                        disableOnInteraction: false,
                    },
                    cubeEffect: { shadow: true, slideShadows: true, shadowOffset: 20, shadowScale: 0.94 },
                    coverflowEffect: { rotate: 50, stretch: 0, depth: 100, modifier: 1, slideShadows: true },
                });

            } catch (error) {
                console.error("Slaytlar yüklenemedi:", error);
            }
        }

        loadSlides();
    </script>
</body>
</html>
